<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#10b981" />
    <meta name="msapplication-TileImage" content="/mstile-150x150.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="StudiesKit — AI-Powered Learning Platform" />
    <meta property="og:description" content="AI-powered learning platform for university courses, professional certifications, and language exams. Your personal tutor that adapts to how you learn." />
    <meta property="og:image" content="https://studieskit.com/og-image.png" />

    <script>
      (function(){
        var t=localStorage.getItem('studieskit-theme');
        if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches))
          document.documentElement.classList.add('dark');
      })();
    </script>

    <div id="root"></div>
